name: Release

on:
  push:
    tags:
      - "v*" # 推送 v 开头的标签时触发

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

  build:
    name: Build and Package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release package
        run: |
          chmod +x package-release.sh
          ./package-release.sh --version ${{ steps.get_version.outputs.VERSION }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coclaw-${{ steps.get_version.outputs.VERSION }}
          path: dist/
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: coclaw-${{ steps.get_version.outputs.VERSION }}
          path: dist/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: generate_notes
        run: |
          # 从 CHANGELOG.md 提取当前版本的发布说明
          VERSION=${{ steps.get_version.outputs.VERSION }}
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release_notes.md

          # 如果没有找到发布说明，使用默认模板
          if [ ! -s release_notes.md ]; then
            cat > release_notes.md <<EOF
          ## 版本 $VERSION

          此版本包含以下更新：

          - 功能改进和 Bug 修复
          - 性能优化
          - 文档更新

          详细更改请查看提交历史。
          EOF
          fi

          echo "notes=$(cat release_notes.md)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Coclaw ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.generate_notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            dist/coclaw-${{ steps.get_version.outputs.VERSION }}.tar.gz
            dist/coclaw-${{ steps.get_version.outputs.VERSION }}.tar.gz.sha256
            dist/coclaw-${{ steps.get_version.outputs.VERSION }}.zip
            dist/coclaw-${{ steps.get_version.outputs.VERSION }}.zip.sha256
            dist/install.sh

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify:
    name: Notify
    needs: [create-release, publish-npm]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send success notification
        if: success()
        run: |
          echo "Release ${{ github.ref }} created successfully!"
          # 这里可以添加 Slack、Discord 等通知

      - name: Send failure notification
        if: failure()
        run: |
          echo "Release ${{ github.ref }} failed!"
          # 这里可以添加失败通知
